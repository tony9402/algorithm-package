profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          5 6
          1
          5 1 1
          1 2 2
          1 3 3
          2 3 4
          2 4 5
          3 4 6
  hidden:
    cases:
      - matrix:
          vars:
            v: [2, 10, 1000]
            mode: ["chain", "random", "unreachable"]
          item:
            name: "hidden-${mode}-${v}"
            type: generator
            seed: "${37000 + v}"
            args:
              minV: "${v}"
              maxV: "${v}"
              mode: "${mode}"
      - name: hidden-large-random
        type: generator
        seed: 37999
        args:
          minV: 20000
          maxV: 20000
          minE: 300000
          maxE: 300000
          mode: "random"
