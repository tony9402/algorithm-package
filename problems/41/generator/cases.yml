  hidden:
    cases:
      - matrix:
          vars:
            n: [1, 10, 1000, 100000]
            mode: ["random", "duplicates", "prefixes"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${41000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
