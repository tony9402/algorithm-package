profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          4 2
          1 1 1 1
      - name: sample-2
        type: fixed
        content: |
          10 5
          1 2 3 4 2 5 3 1 1 2
  hidden:
    cases:
      - matrix:
          vars:
            n:
              range:
                from: 1
                to: 10
          item:
            name: "hidden-random-${n}"
            type: generator
            seed: "${n}"
            args:
              mode: "random"
