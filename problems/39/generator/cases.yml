  hidden:
    cases:
      - matrix:
          vars:
            n: [2, 10, 100]
            mode: ["random", "dense", "duplicates"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${39000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
