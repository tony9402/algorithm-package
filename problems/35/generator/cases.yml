profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          5
          10 20 30 40 50
          5
          1 3
          2 4
          3 5
          1 5
          4 4
  hidden:
    cases:
      - matrix:
          vars:
            n: [1, 10, 1000, 100000]
          item:
            name: "hidden-random-${n}"
            type: generator
            seed: "${35000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              minM: "${n}"
              maxM: "${n}"
