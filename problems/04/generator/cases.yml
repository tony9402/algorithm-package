profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          1
          1
          U+
      - name: sample-2
        type: fixed
        content: |
          2
          4
          U+ U+ U+ U+
          6
          F+ R+ U- B- L+ D-
      - name: sample-3
        type: fixed
        content: |
          4
          1
          L-
          2
          F+ B+
          4
          U- D- L+ R+
          10
          L- U- L+ U- L- U- U- L+ U+ U+
  hidden:
    cases:
      - matrix:
          vars:
            n: [1, 2, 10, 100]
            mode: ["random", "same_face", "inverse_pairs"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${4000 + n}"
            args:
              minT: 1
              maxT: 5
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
      - name: hidden-long-random
        type: generator
        seed: 4999
        args:
          minT: 20
          maxT: 20
          minN: 1000
          maxN: 1000
          mode: "random"
