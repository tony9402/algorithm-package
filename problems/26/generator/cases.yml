profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          5 5
          1 3
          1 4
          4 5
          4 3
          3 2
  hidden:
    cases:
      - matrix:
          vars:
            n:
              range:
                from: 1
                to: 10
          item:
            name: "hidden-random-${n}"
            type: generator
            seed: "${n}"
            args:
              mode: "random"
