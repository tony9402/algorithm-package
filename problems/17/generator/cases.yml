profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          11
          1 4
          3 5
          0 6
          5 7
          3 8
          5 9
          6 10
          8 11
          8 12
          2 13
          12 14
  hidden:
    cases:
      - matrix:
          vars:
            n:
              range:
                from: 1
                to: 5
          item:
            name: "hidden-random-${n}"
            type: generator
            seed: "${n}"
            args:
              mode: "random"
      - matrix:
          vars:
            max_time:
              range:
                from: 23
                to: 10000
                step: 293
          item:
            name: "hidden-random-max-time-${max_time}"
            type: generator
            seed: 1
            args:
              mode: "random"
              max_time: "${max_time}"
