profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          3 1
      - name: sample-2
        type: fixed
        content: |
          4 2
      - name: sample-3
        type: fixed
        content: |
          4 4
  hidden:
    cases:
      - matrix:
          vars:
            N:
              range:
                from: 1
                to: 8
            M:
              range:
                from: 1
                to: 8
          where: "M <= N"
          item:
            name: "hidden-${(N - 1) * 8 + M:02d}"
            type: generator
            seed: 1
            args:
              minN: "${N}"
              maxN: "${N}"
              minM: "${M}"
              maxM: "${M}"
