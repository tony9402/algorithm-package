  hidden:
    cases:
      - matrix:
          vars:
            n: [1, 10, 1000, 10000]
            mode: ["random", "prefix_heavy"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${40000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              minM: "${n}"
              maxM: "${n}"
              mode: "${mode}"
