profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          3 2
          1 3
          2 3
      - name: sample-2
        type: fixed
        content: |
          4 2
          4 2
          3 1
  hidden:
    cases:
      - matrix:
          vars:
            n: [2, 5, 100, 1000]
            mode: ["chain", "random"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${31000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
      - name: hidden-wide
        type: generator
        seed: 31999
        args:
          minN: 32000
          maxN: 32000
          minM: 100000
          maxM: 100000
          mode: "random"
