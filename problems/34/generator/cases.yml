profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          3
          1 2 3
          1 3 2
  hidden:
    cases:
      - matrix:
          vars:
            n: [1, 2, 10, 1000]
            mode: ["random", "left_chain", "right_chain", "balanced"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${34000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
      - name: hidden-large-balanced
        type: generator
        seed: 34999
        args:
          minN: 100000
          maxN: 100000
          mode: "balanced"
