profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          8
          1 2
          1 3
          1 4
          2 5
          2 6
          4 7
          4 8
      - name: sample-2
        type: fixed
        content: |
          9
          1 2
          1 3
          2 4
          3 5
          3 6
          4 7
          4 8
          4 9
  hidden:
    cases:
      - matrix:
          vars:
            n: [2, 5, 30, 1000]
            mode: ["random", "chain", "star", "binary"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${30000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
      - name: hidden-large-chain
        type: generator
        seed: 30999
        args:
          minN: 200000
          maxN: 200000
          mode: "chain"
