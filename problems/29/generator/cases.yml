profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          7
          0 0 2 0 1 2 2
          1 2
          1 3
          1 4
          2 5
          3 6
          3 7
      - name: sample-2
        type: fixed
        content: |
          10
          0 0 1 0 2 1 0 2 2 2
          3 1
          1 4
          9 5
          10 5
          1 2
          3 6
          3 5
          5 8
          4 7
  hidden:
    cases:
      - matrix:
          vars:
            n:
              range:
                from: 1
                to: 5
          item:
            name: "hidden-random-${n}"
            type: generator
            seed: "${n}"
            args:
              mode: "random"
      - matrix:
          vars:
            n:
              range:
                from: 1
                to: 5
          item:
            name: "hidden-skewed-${n}"
            type: generator
            seed: "${n}"
            args:
              mode: "skewed"
      - matrix:
          vars:
            n:
              range:
                from: 1
                to: 1
          item:
            name: "hidden-skewed-${n}-max"
            type: generator
            seed: "${n}"
            args:
              minN: 200000
              maxN: 200000
              mode: "skewed"
