  hidden:
    cases:
      # Random Generator
      - matrix:
          vars:
            i:
              range:
                from: 1
                to: 50
                step: 7
          item:
            name: "hidden-random-${i:02d}"
            type: generator
            seed: 1
            args:
              minN: 1
              maxN: "${i}"
              mode: "random"
      - matrix:
          vars:
            i:
              range:
                from: 1
                to: 5
          item:
            name: "hidden-male-${i:02d}"
            type: generator
            seed: 1
            args:
              minN: 1
              maxN: 50
              mode: "no_random"
              male: 1
      - matrix:
          vars:
            i:
              range:
                from: 1
                to: 5
          item:
            name: "hidden-female-${i:02d}"
            type: generator
            seed: 1
            args:
              minN: 1
              maxN: 50
              mode: "no_random"
              male: 0
      - matrix:
          vars:
            i:
              range:
                from: 1
                to: 3
          item:
            name: "hidden-edgecase1-male-${i:02d}"
            type: generator
            seed: 1
            args:
              minN: 1
              maxN: 50
              mode: "edgecase1"
              male: 0
      - matrix:
          vars:
            i:
              range:
                from: 1
