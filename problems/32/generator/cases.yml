profiles:
  sample:
    cases:
      - name: sample-1
        type: fixed
        content: |
          5
          10 -1
          10 1 -1
          4 1 -1
          4 3 1 -1
          3 3 -1
  hidden:
    cases:
      - matrix:
          vars:
            n: [1, 5, 50, 500]
            mode: ["random", "chain", "dense"]
          item:
            name: "hidden-${mode}-${n}"
            type: generator
            seed: "${32000 + n}"
            args:
              minN: "${n}"
              maxN: "${n}"
              mode: "${mode}"
